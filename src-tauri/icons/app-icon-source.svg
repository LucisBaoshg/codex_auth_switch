<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cyan to Indigo Gradient -->
    <linearGradient id="cloud_gradient" x1="200" y1="200" x2="800" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>   <!-- Cyan -->
      <stop offset="50%" stop-color="#3B82F6"/>  <!-- Blue -->
      <stop offset="100%" stop-color="#4338CA"/> <!-- Indigo -->
    </linearGradient>

    <filter id="squircle_shadow" x="-50" y="-50" width="1124" height="1124" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    
    <filter id="cloud_shadow" x="150" y="150" width="724" height="724" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#3B82F6" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.1"/>
    </filter>

    <filter id="toggle_shadow" x="200" y="300" width="624" height="424" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect x="100" y="100" width="824" height="824" rx="186" fill="#FFFFFF" filter="url(#squircle_shadow)"/>
  <rect x="101" y="101" width="822" height="822" rx="185" fill="none" stroke="#000000" stroke-opacity="0.04" stroke-width="2"/>

  <!-- Hexagonal Cloud -->
  <g fill="url(#cloud_gradient)" filter="url(#cloud_shadow)">
    <!-- 6 Hexagonal Bumps -->
    <circle cx="652" cy="587" r="130"/>
    <circle cx="512" cy="662" r="130"/>
    <circle cx="372" cy="587" r="130"/>
    <circle cx="372" cy="437" r="130"/>
    <circle cx="512" cy="362" r="130"/>
    <circle cx="652" cy="437" r="130"/>
    <!-- Center Fill -->
    <circle cx="512" cy="512" r="160"/>
  </g>

  <!-- Switch Toggle -->
  <g filter="url(#toggle_shadow)">
    <!-- Switch outline -->
    <rect x="332" y="412" width="360" height="200" rx="100" fill="none" stroke="#FFFFFF" stroke-width="44"/>
    <!-- Knob circle -->
    <circle cx="592" cy="512" r="48" fill="#FFFFFF"/>
    
    <!-- Keyhole Cutout -->
    <circle cx="592" cy="504" r="14" fill="#3B82F6"/>
    <path d="M 584 512 L 600 512 L 606 536 C 606 538 604 540 602 540 L 582 540 C 580 540 578 538 578 536 Z" fill="#3B82F6"/>
  </g>
</svg>
