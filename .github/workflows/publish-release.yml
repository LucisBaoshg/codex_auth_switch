name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build, such as a tag or branch"
        required: true
        default: "main"
      tag_name:
        description: "GitHub Release tag name"
        required: true
        default: "v1.0.0"

concurrency:
  group: release-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.ensure-release.outputs.release_id }}

    steps:
      - name: Ensure GitHub release exists
        id: ensure-release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Using existing release ${existing.data.id} for ${tag}`);
              core.setOutput("release_id", String(existing.data.id));
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Codex Auth Switch ${tag}`,
                body: "See the assets to download and install this version.",
                draft: false,
                prerelease: false,
                generate_release_notes: true,
              });
              core.info(`Created release ${created.data.id} for ${tag}`);
              core.setOutput("release_id", String(created.data.id));
            }

  publish-tauri:
    name: Publish ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            args: --bundles nsis
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Sync version from tag
        if: runner.os == 'Windows'
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i "s/^version = .*/version = \"$VERSION\"/" cli/Cargo.toml
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.version='$VERSION'; fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Sync version from tag
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i '' "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i '' "s/^version = .*/version = \"$VERSION\"/" cli/Cargo.toml
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.version='$VERSION'; fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p github-actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p github-actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k github-actions build.keychain
          rm -f certificate.p12

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          args: ${{ matrix.args }}

  publish-linux-cli:
    name: Publish Linux CLI
    runs-on: ubuntu-latest
    needs: publish-tauri
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Sync version from tag
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i "s/^version = .*/version = \"$VERSION\"/" cli/Cargo.toml
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.version='$VERSION'; fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build Linux CLI
        run: cargo build --manifest-path cli/Cargo.toml --release

      - name: Package Linux CLI archive
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          mkdir -p release-assets/linux-cli
          cp cli/target/release/codex-auth-switch-cli release-assets/linux-cli/codex-auth-switch-cli
          chmod +x release-assets/linux-cli/codex-auth-switch-cli
          tar -C release-assets/linux-cli -czf "codex-auth-switch-cli_${VERSION}_linux_x64.tar.gz" codex-auth-switch-cli

      - name: Upload Linux CLI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: codex-auth-switch-cli_*.tar.gz
