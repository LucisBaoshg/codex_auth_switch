name: Publish macOS Intel

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build, such as a tag or branch"
        required: true
        default: "main"
      tag_name:
        description: "GitHub Release tag name"
        required: true
        default: "v1.0.0"

concurrency:
  group: release-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve-release:
    name: Resolve Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_id: ${{ steps.resolve.outputs.release_id }}

    steps:
      - name: Resolve existing GitHub release
        id: resolve
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Using existing release ${release.data.id} for ${tag}`);
              core.setOutput("release_id", String(release.data.id));
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(
                  `Release for ${tag} does not exist yet. Run the main Publish Release workflow for this tag first.`
                );
                return;
              }
              throw error;
            }

  publish-macos-intel:
    name: Publish macOS Intel
    needs: resolve-release
    # Build the Intel bundle on an Apple Silicon runner. This matches Tauri's
    # documented GitHub Actions example and avoids repeated hangs seen on
    # macos-15-intel during codesign.
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Sync version from tag
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i '' "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.version='$VERSION'; fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p github-actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p github-actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k github-actions build.keychain
          rm -f certificate.p12

      - name: Build and publish Intel Tauri release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.resolve-release.outputs.release_id }}
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          args: --target x86_64-apple-darwin --bundles app,dmg
